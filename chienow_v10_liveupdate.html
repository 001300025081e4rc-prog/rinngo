    if(c.s){const div=document.createElement('div');div.className='cell '+(subColor[c.s]||'c-pur');div.innerHTML=`<div class="cell-name">${c.s}</div><div class="cell-teacher">${c.t}</div><div class="cell-room">${c.r}</div>`;td.appendChild(div);}
    tr.appendChild(td);
  });
  tb.appendChild(tr);
});

function renderCards(){
  const dlCards=document.getElementById('dl-cards');
  const wasOpen=[...document.querySelectorAll('.dl-detail')].map(d=>d.style.display==='block');
  dlCards.innerHTML='';
  lines.forEach((l,i)=>{
    const wrap=document.createElement('div');
    wrap.innerHTML=`<div class="dl-card" id="card${i}" onclick="tdl(${i})"><div class="dl-top"><div style="display:flex;align-items:center;gap:10px"><div class="dl-dot" style="background:${l.dot}"></div><div><div class="dl-name">${l.name}</div><div class="dl-op">${l.op}</div></div></div><span class="badge ${l.status==='ng'?'ng':l.status==='info'?'info':'ok'}">${l.status==='ng'?'遅延あり':l.status==='info'?'運行変更':'平常運転'}</span></div><div class="dl-detail" id="dp${i}">${l.msg}<div class="dl-time">${l.time||''} 時点</div></div></div>`;
    dlCards.appendChild(wrap);
  });
  wasOpen.forEach((open,i)=>{if(open){const el=document.getElementById('dp'+i);if(el)el.style.display='block';}});
}
renderCards();

function tdl(i){
  const el=document.getElementById('dp'+i);
  if(el)el.style.display=el.style.display==='block'?'none':'block';
}

// 常時（数秒おきに）京急線の遅延状況を細かく更新するシミュレーション
function liveUpdate(){
  const now=new Date();
  const timeStr=now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const lu=document.getElementById('last-updated');
  if(lu)lu.textContent=timeStr;
  lines.forEach(l=>l.time=timeStr);

  // 京急線：遅延分数を少しずつ揺らす（リアルタイム感）
  if(lines[0].status==='ng'){
    lines[0].delayMin=Math.max(2,(lines[0].delayMin||10)+(Math.random()<0.5?-1:1));
    if(lines[0].delayMin<=2 && Math.random()<0.3){
      lines[0].status='ok';
      lines[0].msg='現在、平常通り運転しています。';
    }else{
      lines[0].msg=`品川〜横浜間で約${lines[0].delayMin}分の遅延が発生しています。`;
    }
  }else if(Math.random()<0.08){
    lines[0].status='ng';
    lines[0].delayMin=Math.floor(Math.random()*10)+3;
    lines[0].msg=`品川〜横浜間で約${lines[0].delayMin}分の遅延が発生しています。`;
  }

  const ngCount=lines.filter(l=>l.status==='ng').length;
  const sub=document.getElementById('home-dl-sub');
  if(sub)sub.textContent=ngCount>0?`${ngCount}路線で遅延中`:'すべて平常運転';

  renderCards();
  const c0=document.getElementById('card0');
  if(c0){c0.classList.add('flash');setTimeout(()=>c0.classList.remove('flash'),500);}
}

liveUpdate();
setInterval(liveUpdate,3000); // 3秒ごとに常時リアルタイム更新

}

const sws=['sw-home','sw-tt','sw-dl'];
function go(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById('scr-'+id).classList.add('on');
  const map={home:'sw-home',tt:'sw-tt',dl:'sw-dl',tc:'sw-home',msg:'sw-home',sent:'sw-home'};
  sws.forEach(b=>{const e=document.getElementById(b);e.style.background='#fff';e.style.color='#1A1A2E';e.style.border='0.5px solid #C0B8F0';});
  const sw=document.getElementById(map[id]);
  if(sw){sw.style.background='#6C47FF';sw.style.color='#fff';sw.style.border='none';}
}
